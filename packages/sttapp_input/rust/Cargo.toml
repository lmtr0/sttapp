[package]
name = "sttapp-input"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
name = "sttapp_input"
crate-type = ["cdylib", "rlib"]

[dependencies]
arboard = { version = "3.6.1", default-features = false, features = ["wayland-data-control"] }
enigo = { version = "0.6.1", default-features = false, features = ["x11rb"] }
