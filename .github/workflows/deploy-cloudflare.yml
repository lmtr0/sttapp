name: Deploy hosted API to Cloudflare

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/deploy-cloudflare.yml

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Migrate and deploy production Worker
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_HYPERDRIVE_ID: ${{ vars.CLOUDFLARE_HYPERDRIVE_ID }}
      PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
      INTERNAL_READINESS_TOKEN: ${{ secrets.INTERNAL_READINESS_TOKEN }}
      CLERK_ISSUER: ${{ vars.CLERK_ISSUER }}
      CLERK_JWKS_URL: ${{ vars.CLERK_JWKS_URL }}
      CLERK_SIGN_IN_URL: ${{ vars.CLERK_SIGN_IN_URL }}
      CLERK_AUTHORIZED_PARTIES: ${{ vars.CLERK_AUTHORIZED_PARTIES }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      CLERK_WEBHOOK_SECRET: ${{ secrets.CLERK_WEBHOOK_SECRET }}
      DODO_API_KEY: ${{ secrets.DODO_API_KEY }}
      DODO_WEBHOOK_SECRET: ${{ secrets.DODO_WEBHOOK_SECRET }}
      DODO_PRODUCT_ID: ${{ vars.DODO_PRODUCT_ID }}
      DODO_METER_TURBO_ID: ${{ vars.DODO_METER_TURBO_ID }}
      DODO_METER_LARGE_ID: ${{ vars.DODO_METER_LARGE_ID }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      ACCESS_TOKEN_PRIVATE_JWK: ${{ secrets.ACCESS_TOKEN_PRIVATE_JWK }}
      ACCESS_TOKEN_PUBLIC_JWKS: ${{ vars.ACCESS_TOKEN_PUBLIC_JWKS }}
      ACCESS_TOKEN_KEY_ID: ${{ vars.ACCESS_TOKEN_KEY_ID }}
      REFRESH_TOKEN_PEPPER: ${{ secrets.REFRESH_TOKEN_PEPPER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        shell: bash
        run: |
          set -euo pipefail
          required=(
            CLOUDFLARE_API_TOKEN
            CLOUDFLARE_ACCOUNT_ID
            CLOUDFLARE_HYPERDRIVE_ID
            PRODUCTION_DATABASE_URL
            INTERNAL_READINESS_TOKEN
            CLERK_ISSUER
            CLERK_JWKS_URL
            CLERK_SIGN_IN_URL
            CLERK_AUTHORIZED_PARTIES
            CLERK_SECRET_KEY
            CLERK_WEBHOOK_SECRET
            DODO_API_KEY
            DODO_WEBHOOK_SECRET
            DODO_PRODUCT_ID
            DODO_METER_TURBO_ID
            DODO_METER_LARGE_ID
            GROQ_API_KEY
            ACCESS_TOKEN_PRIVATE_JWK
            ACCESS_TOKEN_PUBLIC_JWKS
            ACCESS_TOKEN_KEY_ID
            REFRESH_TOKEN_PEPPER
          )
          missing=()
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} )); then
            printf 'Missing production configuration: %s\n' "${missing[*]}" >&2
            exit 1
          fi
          if [[ ! "$CLOUDFLARE_HYPERDRIVE_ID" =~ ^[[:xdigit:]]{32}$ ]]; then
            echo 'CLOUDFLARE_HYPERDRIVE_ID must be a 32-character hexadecimal ID.' >&2
            exit 1
          fi

      - name: Generate production Wrangler configuration
        shell: bash
        run: |
          set -euo pipefail
          sed \
            "s/__CLOUDFLARE_HYPERDRIVE_ID__/$CLOUDFLARE_HYPERDRIVE_ID/" \
            backend/wrangler.jsonc > backend/wrangler.generated.jsonc
          mv backend/wrangler.generated.jsonc backend/wrangler.jsonc
          if grep -q '__CLOUDFLARE_HYPERDRIVE_ID__' backend/wrangler.jsonc; then
            echo 'Hyperdrive placeholder was not replaced.' >&2
            exit 1
          fi

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.3

      - name: Verify backend
        working-directory: backend
        run: |
          deno ci
          deno task verify

      - name: Apply production database migrations
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: deno task migrate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Worker dependencies
        working-directory: backend
        run: npm ci --ignore-scripts

      - name: Check Worker bundle
        working-directory: backend
        run: npm run cloudflare:check

      - name: Deploy Worker and production secrets
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: backend
          command: deploy
          secrets: |
            INTERNAL_READINESS_TOKEN
            CLERK_ISSUER
            CLERK_JWKS_URL
            CLERK_SIGN_IN_URL
            CLERK_AUTHORIZED_PARTIES
            CLERK_SECRET_KEY
            CLERK_WEBHOOK_SECRET
            DODO_API_KEY
            DODO_WEBHOOK_SECRET
            DODO_PRODUCT_ID
            DODO_METER_TURBO_ID
            DODO_METER_LARGE_ID
            GROQ_API_KEY
            ACCESS_TOKEN_PRIVATE_JWK
            ACCESS_TOKEN_PUBLIC_JWKS
            ACCESS_TOKEN_KEY_ID
            REFRESH_TOKEN_PEPPER
        env:
          INTERNAL_READINESS_TOKEN: ${{ secrets.INTERNAL_READINESS_TOKEN }}
          CLERK_ISSUER: ${{ vars.CLERK_ISSUER }}
          CLERK_JWKS_URL: ${{ vars.CLERK_JWKS_URL }}
          CLERK_SIGN_IN_URL: ${{ vars.CLERK_SIGN_IN_URL }}
          CLERK_AUTHORIZED_PARTIES: ${{ vars.CLERK_AUTHORIZED_PARTIES }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_WEBHOOK_SECRET: ${{ secrets.CLERK_WEBHOOK_SECRET }}
          DODO_API_KEY: ${{ secrets.DODO_API_KEY }}
          DODO_WEBHOOK_SECRET: ${{ secrets.DODO_WEBHOOK_SECRET }}
          DODO_PRODUCT_ID: ${{ vars.DODO_PRODUCT_ID }}
          DODO_METER_TURBO_ID: ${{ vars.DODO_METER_TURBO_ID }}
          DODO_METER_LARGE_ID: ${{ vars.DODO_METER_LARGE_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ACCESS_TOKEN_PRIVATE_JWK: ${{ secrets.ACCESS_TOKEN_PRIVATE_JWK }}
          ACCESS_TOKEN_PUBLIC_JWKS: ${{ vars.ACCESS_TOKEN_PUBLIC_JWKS }}
          ACCESS_TOKEN_KEY_ID: ${{ vars.ACCESS_TOKEN_KEY_ID }}
          REFRESH_TOKEN_PEPPER: ${{ secrets.REFRESH_TOKEN_PEPPER }}
