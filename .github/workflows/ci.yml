name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  flutter:
    name: Flutter checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libkeybinder-3.0-dev \
            libsecret-1-dev \
            libxkbcommon-dev \
            ninja-build \
            pkg-config

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/sttapp_audio/rust -> target
            packages/sttapp_input/rust -> target
            packages/sttapp_secret_storage/rust -> target

      - name: Install Dart dependencies
        run: flutter pub get

      - name: Analyze app
        run: flutter analyze --no-pub lib test

      - name: Test app
        run: flutter test --no-pub

      - name: Install sttapp_audio dependencies
        run: dart pub get
        working-directory: packages/sttapp_audio

      - name: Analyze sttapp_audio package
        run: dart analyze
        working-directory: packages/sttapp_audio

      - name: Test sttapp_audio package
        run: dart test
        working-directory: packages/sttapp_audio

      - name: Install sttapp_input dependencies
        run: dart pub get
        working-directory: packages/sttapp_input

      - name: Analyze sttapp_input package
        run: dart analyze
        working-directory: packages/sttapp_input

      - name: Test sttapp_input package
        run: dart test
        working-directory: packages/sttapp_input

      - name: Install sttapp_secret_storage dependencies
        run: dart pub get
        working-directory: packages/sttapp_secret_storage

      - name: Analyze sttapp_secret_storage package
        run: dart analyze
        working-directory: packages/sttapp_secret_storage

      - name: Test sttapp_secret_storage package
        run: dart test
        working-directory: packages/sttapp_secret_storage

  rust:
    name: Rust tests
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        package:
          - sttapp_audio
          - sttapp_input
          - sttapp_secret_storage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libsecret-1-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/${{ matrix.package }}/rust -> target

      - name: Test ${{ matrix.package }}
        run: cargo test --locked
        working-directory: packages/${{ matrix.package }}/rust
