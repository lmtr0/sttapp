name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  flutter:
    name: Flutter checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libkeybinder-3.0-dev \
            libsecret-1-dev \
            libxkbcommon-dev \
            ninja-build \
            pkg-config

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/sttapp_audio/rust -> target
            packages/sttapp_input/rust -> target

      - name: Install Dart dependencies
        run: flutter pub get

      - name: Analyze app
        run: flutter analyze --no-pub lib test

      - name: Test app
        run: flutter test --no-pub

      - name: Install sttapp_audio dependencies
        run: dart pub get
        working-directory: packages/sttapp_audio

      - name: Analyze sttapp_audio package
        run: dart analyze
        working-directory: packages/sttapp_audio

      - name: Test sttapp_audio package
        run: dart test
        working-directory: packages/sttapp_audio

      - name: Install sttapp_input dependencies
        run: dart pub get
        working-directory: packages/sttapp_input

      - name: Analyze sttapp_input package
        run: dart analyze
        working-directory: packages/sttapp_input

      - name: Test sttapp_input package
        run: dart test
        working-directory: packages/sttapp_input

  rust:
    name: Rust tests
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        package:
          - sttapp_audio
          - sttapp_input

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/${{ matrix.package }}/rust -> target

      - name: Test ${{ matrix.package }}
        run: cargo test --locked
        working-directory: packages/${{ matrix.package }}/rust

  macos:
    name: macOS universal build
    runs-on: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install Dart dependencies
        run: flutter pub get

      - name: Run Flutter tests
        run: flutter test --no-pub

      - name: Run macOS runner tests
        run: >
          xcodebuild test
          -workspace macos/Runner.xcworkspace
          -scheme Runner
          -configuration Debug
          -destination 'platform=macOS'

      - name: Build universal macOS app
        run: flutter build macos --release --no-pub

      - name: Verify Mach-O slices and signatures
        shell: bash
        run: |
          app="build/macos/Build/Products/Release/sttapp.app"
          found_macho=0

          while IFS= read -r -d '' binary; do
            if ! file "${binary}" | grep -q 'Mach-O'; then
              continue
            fi

            found_macho=1
            archs="$(lipo -archs "${binary}")"
            case " ${archs} " in
              *" arm64 "*) ;;
              *) echo "Missing arm64 slice: ${binary} (${archs})" >&2; exit 1 ;;
            esac
            case " ${archs} " in
              *" x86_64 "*) ;;
              *) echo "Missing x86_64 slice: ${binary} (${archs})" >&2; exit 1 ;;
            esac
          done < <(find "${app}" -type f -print0)

          test "${found_macho}" -eq 1
          codesign --verify --deep --strict "${app}"
