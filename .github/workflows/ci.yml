name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Deno backend checks
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: sttapp_test
          POSTGRES_USER: sttapp
          POSTGRES_PASSWORD: sttapp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sttapp -d sttapp_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://sttapp:sttapp@127.0.0.1:5432/sttapp_test
      TEST_DATABASE_URL: postgres://sttapp:sttapp@127.0.0.1:5432/sttapp_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.3
      - name: Install locked backend dependencies
        run: deno ci
        working-directory: backend
      - name: Verify backend
        run: deno task verify
        working-directory: backend
      - name: Verify migrations forward, down, and forward
        run: |
          deno task migrate
          deno task test:integration
          deno task migrate:down
          deno task migrate
        working-directory: backend

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan repository
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  flutter:
    name: Flutter checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libkeybinder-3.0-dev \
            libsecret-1-dev \
            libxkbcommon-dev \
            ninja-build \
            pkg-config

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/sttapp_audio/rust -> target
            packages/sttapp_input/rust -> target
            packages/sttapp_secret_storage/rust -> target

      - name: Install Dart dependencies
        run: flutter pub get

      - name: Analyze app
        run: flutter analyze --no-pub lib test

      - name: Test app
        run: flutter test --no-pub

      - name: Build Flutter Linux application
        run: flutter build linux --release --no-pub

      - name: Install sttapp_audio dependencies
        run: dart pub get
        working-directory: packages/sttapp_audio

      - name: Analyze sttapp_audio package
        run: dart analyze
        working-directory: packages/sttapp_audio

      - name: Test sttapp_audio package
        run: dart test
        working-directory: packages/sttapp_audio

      - name: Install sttapp_input dependencies
        run: dart pub get
        working-directory: packages/sttapp_input

      - name: Analyze sttapp_input package
        run: dart analyze
        working-directory: packages/sttapp_input

      - name: Test sttapp_input package
        run: dart test
        working-directory: packages/sttapp_input

      - name: Install sttapp_secret_storage dependencies
        run: dart pub get
        working-directory: packages/sttapp_secret_storage

      - name: Analyze sttapp_secret_storage package
        run: dart analyze
        working-directory: packages/sttapp_secret_storage

      - name: Test sttapp_secret_storage package
        run: dart test
        working-directory: packages/sttapp_secret_storage

  windows:
    name: Windows build and installer smoke test
    runs-on: windows-2025
    env:
      STTAPP_RUST_BUILDER: zigbuild

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/sttapp_audio/rust -> target
            packages/sttapp_input/rust -> target
            packages/sttapp_secret_storage/rust -> target

      - name: Install Dart dependencies
        run: flutter pub get

      - name: Build Flutter Windows application
        run: >
          flutter build windows
          --release
          --build-name 0.0.0
          --build-number ${{ github.run_number }}

      - name: Download Microsoft Visual C++ Redistributable
        shell: pwsh
        run: |
          $destination = "build\installer\VC_redist.x64.exe"
          New-Item -ItemType Directory -Path (Split-Path $destination) -Force | Out-Null
          Invoke-WebRequest `
            -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" `
            -OutFile $destination

          $signature = Get-AuthenticodeSignature $destination
          if ($signature.Status -ne 'Valid' -or
              $signature.SignerCertificate.Subject -notlike '*Microsoft Corporation*') {
            throw "VC++ Redistributable signature validation failed: $($signature.Status) $($signature.StatusMessage)"
          }

      - name: Install Inno Setup compiler
        shell: pwsh
        run: choco install innosetup --no-progress --yes

      - name: Build Windows installer
        shell: pwsh
        run: |
          $installer = "sttapp-windows-x64-ci-setup.exe"
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            throw "Inno Setup compiler was not found at $iscc"
          }

          & $iscc `
            "/DAppVersion=0.0.0" `
            "/O$PWD" `
            "/F$([IO.Path]::GetFileNameWithoutExtension($installer))" `
            "installer\windows\sttapp.iss"
          if ($LASTEXITCODE -ne 0 -or -not (Test-Path $installer)) {
            throw "Inno Setup did not produce $installer"
          }

          "installer_path=$installer" >> $env:GITHUB_ENV

      - name: Smoke test Windows installer and application startup
        shell: pwsh
        run: |
          $installer = Resolve-Path "${{ env.installer_path }}"
          $installLog = Join-Path $env:RUNNER_TEMP 'sttapp-installer.log'
          $setup = Start-Process `
            -FilePath $installer `
            -ArgumentList @(
              '/VERYSILENT',
              '/SUPPRESSMSGBOXES',
              '/NORESTART',
              '/RESTARTEXITCODE=3010',
              "/LOG=`"$installLog`""
            ) `
            -Wait `
            -PassThru
          if ($setup.ExitCode -notin @(0, 3010)) {
            Get-Content $installLog -ErrorAction SilentlyContinue
            throw "Installer exited with code $($setup.ExitCode)"
          }

          $executable = Join-Path $env:ProgramFiles 'sttapp\sttapp.exe'
          if (-not (Test-Path $executable)) {
            Get-Content $installLog -ErrorAction SilentlyContinue
            throw "Installed executable was not found at $executable"
          }

          $app = Start-Process -FilePath $executable -PassThru
          Start-Sleep -Seconds 10
          if ($app.HasExited) {
            $startupLog = Join-Path $env:LOCALAPPDATA 'sttapp\startup.log'
            Get-Content $startupLog -ErrorAction SilentlyContinue
            throw "Installed application exited during startup with code $($app.ExitCode)"
          }

          Stop-Process -Id $app.Id -Force

  macos:
    name: macOS build
    runs-on: macos-15-intel
    env:
      STTAPP_RUST_BUILDER: zigbuild

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/sttapp_audio/rust -> target
            packages/sttapp_input/rust -> target
            packages/sttapp_secret_storage/rust -> target

      - name: Install Dart dependencies
        run: flutter pub get

      - name: Build Flutter macOS application
        run: flutter build macos --release --no-pub

  rust:
    name: Rust tests
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        package:
          - sttapp_audio
          - sttapp_input
          - sttapp_secret_storage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libsecret-1-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/${{ matrix.package }}/rust -> target

      - name: Test ${{ matrix.package }}
        run: cargo test --locked
        working-directory: packages/${{ matrix.package }}/rust
