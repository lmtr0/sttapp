name: publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Version tag to publish, for example v1.2.3
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    name: Validate version
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}

    steps:
      - name: Resolve version
        id: version
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REQUESTED_TAG: ${{ inputs.tag }}
        run: |
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${REQUESTED_TAG}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected a semver tag like v1.2.3, got '${tag}'." >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${tag#v}" >> "${GITHUB_OUTPUT}"
          echo "build_number=${GITHUB_RUN_NUMBER}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.artifact_name }}
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: sttapp-linux-x64
            runner: ubuntu-24.04
            platform: linux
            rust_target: x86_64-unknown-linux-gnu
            flutter_target: linux
            archive_extension: tar.gz
            archive_command: tar -czf
            archive_source: build/linux/x64/release/bundle
          - artifact_name: sttapp-windows-x64
            runner: windows-2025
            platform: windows
            rust_target: x86_64-pc-windows-msvc
            flutter_target: windows
            archive_extension: zip
            archive_source: build/windows/x64/runner/Release
          - artifact_name: sttapp-macos-x64
            runner: macos-15-intel
            platform: macos
            rust_target: x86_64-apple-darwin
            flutter_target: macos
            archive_extension: zip
            archive_source: build/macos/Build/Products/Release/sttapp.app

    env:
      STTAPP_RUST_BUILDER: zigbuild

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libkeybinder-3.0-dev \
            libsecret-1-dev \
            libxkbcommon-dev \
            ninja-build \
            pkg-config

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/sttapp_audio/rust -> target
            packages/sttapp_input/rust -> target

      - name: Install Dart dependencies
        run: flutter pub get

      - name: Build Flutter ${{ matrix.flutter_target }}
        run: >
          flutter build ${{ matrix.flutter_target }}
          --release
          --build-name ${{ needs.validate.outputs.version }}
          --build-number ${{ needs.validate.outputs.build_number }}

      - name: Archive Linux bundle
        if: matrix.platform == 'linux'
        run: |
          archive="${{ matrix.artifact_name }}-${{ needs.validate.outputs.tag }}.${{ matrix.archive_extension }}"
          ${{ matrix.archive_command }} "${archive}" -C "${{ matrix.archive_source }}" .
          echo "archive_path=${archive}" >> "${GITHUB_ENV}"

      - name: Archive Windows bundle
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $archive = "${{ matrix.artifact_name }}-${{ needs.validate.outputs.tag }}.${{ matrix.archive_extension }}"
          Compress-Archive -Path "${{ matrix.archive_source }}\*" -DestinationPath $archive -Force
          "archive_path=$archive" >> $env:GITHUB_ENV

      - name: Archive macOS app
        if: matrix.platform == 'macos'
        run: |
          archive="${{ matrix.artifact_name }}-${{ needs.validate.outputs.tag }}.${{ matrix.archive_extension }}"
          ditto -c -k --sequesterRsrc --keepParent "${{ matrix.archive_source }}" "${archive}"
          echo "archive_path=${archive}" >> "${GITHUB_ENV}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ needs.validate.outputs.tag }}
          path: ${{ env.archive_path }}
          if-no-files-found: error

  release:
    name: Draft GitHub release
    needs:
      - validate
      - build
    runs-on: ubuntu-24.04

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: sttapp ${{ needs.validate.outputs.tag }}
          body: See the assets to download this version and install.
          draft: true
          prerelease: false
          files: release-assets/*
