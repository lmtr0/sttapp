name: publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Version tag to publish, for example v1.2.3
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    name: Validate version
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}

    steps:
      - name: Resolve version
        id: version
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REQUESTED_TAG: ${{ inputs.tag }}
        run: |
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${REQUESTED_TAG}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected a semver tag like v1.2.3, got '${tag}'." >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${tag#v}" >> "${GITHUB_OUTPUT}"
          echo "build_number=${GITHUB_RUN_NUMBER}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.artifact_name }}
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: sttapp-linux-x64
            runner: ubuntu-24.04
            platform: linux
            rust_target: x86_64-unknown-linux-gnu
            flutter_target: linux
            archive_extension: tar.gz
            archive_command: tar -czf
            archive_source: build/linux/x64/release/bundle
          - artifact_name: sttapp-windows-x64
            runner: windows-2025
            platform: windows
            rust_target: x86_64-pc-windows-msvc
            flutter_target: windows
            archive_extension: zip
            archive_source: build/windows/x64/runner/Release
          - artifact_name: sttapp-macos-x64
            runner: macos-15-intel
            platform: macos
            rust_target: x86_64-apple-darwin
            flutter_target: macos
            archive_extension: zip
            archive_source: build/macos/Build/Products/Release/sttapp.app

    env:
      STTAPP_RUST_BUILDER: zigbuild

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libkeybinder-3.0-dev \
            libsecret-1-dev \
            libxkbcommon-dev \
            ninja-build \
            pkg-config

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install macOS Rust targets
        if: matrix.platform == 'macos'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/sttapp_audio/rust -> target
            packages/sttapp_input/rust -> target

      - name: Install Dart dependencies
        run: flutter pub get

      - name: Build Flutter ${{ matrix.flutter_target }}
        run: >
          flutter build ${{ matrix.flutter_target }}
          --release
          --build-name ${{ needs.validate.outputs.version }}
          --build-number ${{ needs.validate.outputs.build_number }}

      - name: Bundle Linux runtime libraries and launcher
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          bundle_dir="${{ matrix.archive_source }}"
          bundle_lib_dir="${{ matrix.archive_source }}/lib"
          mkdir -p "${bundle_lib_dir}"

          copy_library() {
            local soname="$1"
            local source_path

            source_path="$(ldconfig -p | awk -v soname="${soname}" '$1 == soname { print $NF; exit }')"
            if [ -z "${source_path}" ]; then
              echo "Could not find ${soname} in the dynamic linker cache." >&2
              exit 1
            fi

            cp -L "${source_path}" "${bundle_lib_dir}/${soname}"
          }

          copy_library libayatana-appindicator3.so.1
          copy_library libayatana-indicator3.so.7
          copy_library libayatana-ido3-0.4.so.0
          copy_library libdbusmenu-glib.so.4
          copy_library libdbusmenu-gtk3.so.4
          copy_library libkeybinder-3.0.so.0
          copy_library libsecret-1.so.0

          mv "${bundle_dir}/sttapp" "${bundle_dir}/sttapp.bin"
          cat > "${bundle_dir}/sttapp" <<'SH'
          #!/usr/bin/env sh
          set -eu

          app_dir="$(dirname "$0")"
          app_dir="$(CDPATH= cd "$app_dir" && pwd -P)"

          export LD_LIBRARY_PATH="${app_dir}/lib${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}"
          export STTAPP_LAUNCHER_PATH="${app_dir}/sttapp"
          exec "${app_dir}/sttapp.bin" "$@"
          SH
          chmod +x "${bundle_dir}/sttapp"

      - name: Archive Linux bundle
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          archive="${{ matrix.artifact_name }}-${{ needs.validate.outputs.tag }}.${{ matrix.archive_extension }}"
          ${{ matrix.archive_command }} "${archive}" -C "${{ matrix.archive_source }}" .
          appdir="sttapp.AppDir"
          appimage="${{ matrix.artifact_name }}-${{ needs.validate.outputs.tag }}.AppImage"

          rm -rf "${appdir}"
          cp -a "${{ matrix.archive_source }}" "${appdir}"
          cp linux/com.taresz.sttapp.desktop "${appdir}/com.taresz.sttapp.desktop"
          cp linux/icons/hicolor/512x512/apps/sttapp.png "${appdir}/sttapp.png"
          ln -s sttapp "${appdir}/AppRun"

          curl -fsSL \
            -o appimagetool-x86_64.AppImage \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 VERSION="${{ needs.validate.outputs.version }}" \
            ./appimagetool-x86_64.AppImage "${appdir}" "${appimage}"

          {
            echo "archive_path<<EOF"
            echo "${archive}"
            echo "${appimage}"
            echo "EOF"
          } >> "${GITHUB_ENV}"

      - name: Archive Windows bundle
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $archive = "${{ matrix.artifact_name }}-${{ needs.validate.outputs.tag }}.${{ matrix.archive_extension }}"
          Compress-Archive -Path "${{ matrix.archive_source }}\*" -DestinationPath $archive -Force
          "archive_path=$archive" >> $env:GITHUB_ENV

      - name: Archive macOS app
        if: matrix.platform == 'macos'
        run: |
          archive="${{ matrix.artifact_name }}-${{ needs.validate.outputs.tag }}.${{ matrix.archive_extension }}"
          ditto -c -k --sequesterRsrc --keepParent "${{ matrix.archive_source }}" "${archive}"
          echo "archive_path=${archive}" >> "${GITHUB_ENV}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ needs.validate.outputs.tag }}
          path: ${{ env.archive_path }}
          if-no-files-found: error

  release:
    name: Draft GitHub release
    needs:
      - validate
      - build
    runs-on: ubuntu-24.04

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: sttapp ${{ needs.validate.outputs.tag }}
          body: See the assets to download this version and install.
          draft: true
          prerelease: false
          files: release-assets/*
